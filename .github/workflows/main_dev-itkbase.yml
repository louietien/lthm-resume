# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Deploy Python app to Azure Web App - dev-itkbase

concurrency:
  group: azure-webapp-dev-itkbase-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: dev-itkbase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_956727D365E442C4954F3FDE654B04F5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_DD389E4612F84429A873DA1507C23073 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_4CD1DF927A1344B1BE1DED0FC01346BE }}

      - name: Resolve resource group
        id: resolve-rg
        uses: azure/cli@v2
        with:
          inlineScript: |
            RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup | [0]" -o tsv)
            if [ -z "$RESOURCE_GROUP" ]; then
              echo "Could not resolve resource group for app '${{ env.AZURE_WEBAPP_NAME }}'."
              exit 1
            fi
            echo "resource_group=$RESOURCE_GROUP" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Web App (attempt 1)
        id: deploy-attempt-1
        continue-on-error: true
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: .

      - name: Wait before deploy retry
        if: steps.deploy-attempt-1.outcome == 'failure'
        run: sleep 45

      - name: Restart web app before deploy retry
        if: steps.deploy-attempt-1.outcome == 'failure'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart --name "${{ env.AZURE_WEBAPP_NAME }}" --resource-group "${{ steps.resolve-rg.outputs.resource_group }}"
            sleep 25

      - name: Deploy to Azure Web App (attempt 2)
        if: steps.deploy-attempt-1.outcome == 'failure'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          package: .
